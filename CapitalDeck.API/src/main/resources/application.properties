# 1. Server Configuration (Back to 8080 as requested)
server.port=8080

# 2. Application Name
spring.application.name=CapitalDeck-API

# 3. Database Configuration (REQUIRED for startup)
spring.datasource.url=jdbc:h2:mem:capitaldeckdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=password

# 4. JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 5. Swagger Configuration
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.operations-sorter=alpha